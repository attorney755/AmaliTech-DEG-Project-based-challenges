services:
  - type: web
    name: idempotency-gateway
    runtime: python
    repo: https://github.com/attorney755/AmaliTech-DEG-Project-based-challenges
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /
